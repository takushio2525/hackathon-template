; node_01 PlatformIO 設定
; ボード型番は議論で確定次第，[env:xxx] を差し替える。
; ここでは暫定で Arduino Uno R4 WiFi を置いているが，
; Nano / ESP32 / esp32-s3 等に一括置換可能な形にしてある。

[env:uno_r4_wifi]
platform = renesas-ra
board = uno_r4_wifi
framework = arduino
monitor_speed = 115200

; --- 共通ライブラリ（firmware/common/lib/）を全ノードで共有 ---
lib_extra_dirs = ../common/lib

; include/ をインクルードパスに追加（SystemData.h / ProjectConfig.h 参照用）
; 各共通モジュールのヘッダも明示的に追加しておく
build_flags =
    -I include
    -I ../common/lib/ModuleCore
    -I ../common/lib/CommModule
    -I ../common/lib/SyncModule
    -I ../common/lib/ScoreModule

; このノード固有のライブラリは lib/ 以下に置く（自動で検出される）
