name: LaTeX Build

on:
  push:
    paths:
      - 'report/**/*.tex'
      - 'report/**/*.bib'
      - 'report/**/*.sty'
      - 'report/**/*.cls'
      - 'report/.latexmkrc'
      - '.github/workflows/latex-build.yml'
  pull_request:
    paths:
      - 'report/**'
      - '.github/workflows/latex-build.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # PR では head、push では対象ブランチを明示的にチェックアウトする
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0

      - name: Compile LaTeX
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/report:/workspace" \
            -w /workspace \
            ghcr.io/paperist/texlive-ja:debian \
            latexmk -jobname=main_auto main.tex

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: report-pdf
          path: report/main_auto.pdf
          if-no-files-found: warn
