name: LaTeX Build

on:
  push:
    paths:
      - 'report/**/*.tex'
      - 'report/**/*.bib'
      - 'report/**/*.sty'
      - 'report/**/*.cls'
      - 'report/.latexmkrc'
      - '.github/workflows/latex-build.yml'
  pull_request:
    paths:
      - 'report/**'
      - '.github/workflows/latex-build.yml'

# 生成した PDF を同じブランチへ push するための書き込み権限
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # PR では head、push では対象ブランチを明示的にチェックアウトする
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0

      - name: Compile LaTeX
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/report:/workspace" \
            -w /workspace \
            ghcr.io/paperist/texlive-ja:debian \
            latexmk main.tex

      - name: Upload PDF artifact (PR)
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: report-pdf
          path: report/main.pdf
          if-no-files-found: warn

      - name: Commit PDF to branch (push)
        if: github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add report/main.pdf
          if git diff --staged --quiet; then
            echo "PDF に変更なし。コミットをスキップします"
          else
            git commit -m "[自動コンパイル] main.pdf を更新 [skip ci]"
            git push origin HEAD:${{ github.ref_name }}
          fi
